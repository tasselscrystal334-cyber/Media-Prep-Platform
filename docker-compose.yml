services:
  api:
    build: .
    command: mediaqc enterprise-api --host 0.0.0.0 --port 8080
    env_file: .env
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - minio
    volumes:
      - ./reports:/app/reports
      - ./Media:/app/Media

  worker:
    build: .
    command: python -m mediaqc.enterprise.worker
    env_file: .env
    depends_on:
      - redis
      - rabbitmq
    volumes:
      - ./reports:/app/reports
      - ./Media:/app/Media

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mediaqc
      POSTGRES_USER: mediaqc
      POSTGRES_PASSWORD: mediaqc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: mediaqc
      RABBITMQ_DEFAULT_PASS: mediaqc
    ports:
      - "5672:5672"
      - "15672:15672"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: mediaqc
      MINIO_ROOT_PASSWORD: mediaqcpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
