project_name: "LED Show 2026"
validators:
  codec: true
  resolution: true
  framerate: true
  colorspace: true
  pixfmt: true
  bitrate: true
  audio: true
  filename: true
  filesize: true
  folder_structure: true
video:
  allowed_codecs:
    - hap
    - prores
    - notchlc
  expected_width: 6400
  expected_height: 2000
  expected_fps: 60
  allowed_pix_fmt:
    - rgb0
    - rgba
    - yuv422p10le
  expected_color_space: bt709
  expected_bit_depth: 8
audio:
  allow_audio: false
filename:
  required_pattern: "^[A-Za-z0-9][A-Za-z0-9_.-]+\\.(mov|mp4|mxf|mkv|avi|png|jpg|jpeg|tif|tiff|exr|wav|aiff|mp3)$"
  forbidden_pattern: "[\\s\\u4e00-\\u9fff]"
folder:
  required_path_patterns:
    - "(?i)/(media|content|footage|playback|led)/"
file:
  min_size_bytes: 1024
  max_size_bytes: 100000000000
